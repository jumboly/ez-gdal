name: release

on:
  push:
    tags: ['v*']

jobs:
  # 3 RID (osx-arm64 / linux-x64 / linux-arm64) は ubuntu で pack。
  # Windows プラグイン SDK が不要な RID なので host OS は問わない。
  pack-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: tag が csproj <Version> と一致するか
        run: |
          tag="${GITHUB_REF_NAME#v}"
          csver=$(grep -oP '(?<=<Version>)[^<]+' src/EzGdal/EzGdal.csproj)
          echo "tag=$tag csproj=$csver"
          test "$tag" = "$csver"

      - name: Pack 3 RIDs
        run: |
          ./scripts/pack-tool.sh osx-arm64
          ./scripts/pack-tool.sh linux-x64
          ./scripts/pack-tool.sh linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-linux
          path: nupkg/Jumboly.EzGdal.*.nupkg
          if-no-files-found: error

  # win-x64 は windows-2022 で pack。MSVC 環境を立てたうえで
  # scripts/win-sdk/generate-sdk.ps1 を走らせ、sdk/ を生成してから pack する。
  # csproj の <ItemGroup Condition="...win-x64..."> が sdk/ を nupkg に同梱する。
  pack-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: tag が csproj <Version> と一致するか
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}".TrimStart('v')
          $csver = (Select-String -Path src/EzGdal/EzGdal.csproj -Pattern '<Version>([^<]+)</Version>').Matches[0].Groups[1].Value
          Write-Host "tag=$tag csproj=$csver"
          if ($tag -ne $csver) { throw "version mismatch" }

      - uses: ./.github/actions/setup-msvc

      - name: Restore + SDK 生成 + pack (win-x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # csproj の <MaxRevGdalVersion> / <GdalUpstreamVersion> を取り出して
          # generate-sdk.ps1 に explicit に渡す (csproj を source of truth に固定)。
          $maxRev = (dotnet msbuild src/EzGdal/EzGdal.csproj -getProperty:MaxRevGdalVersion).Trim()
          $gdal   = (dotnet msbuild src/EzGdal/EzGdal.csproj -getProperty:GdalUpstreamVersion).Trim()
          Write-Host "MaxRevGdalVersion=$maxRev GdalUpstreamVersion=$gdal"

          dotnet restore src/EzGdal/EzGdal.csproj -p:_NeedWindows=true -p:RuntimeIdentifier=win-x64
          .\scripts\win-sdk\generate-sdk.ps1 -MaxRevGdalVersion $maxRev -GdalUpstreamVersion $gdal
          bash ./scripts/pack-tool.sh win-x64

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs-windows
          path: nupkg/Jumboly.EzGdal.*.nupkg
          if-no-files-found: error

  verify:
    needs: [pack-linux, pack-windows]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,     rid: linux-x64 }
          - { os: ubuntu-22.04-arm, rid: linux-arm64 }
          - { os: macos-14,         rid: osx-arm64 }
          - { os: windows-2022,     rid: win-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          path: nupkg
          merge-multiple: true

      - name: tool install
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          dotnet tool install --tool-path ./tool-test \
            --add-source ./nupkg \
            "Jumboly.EzGdal.${{ matrix.rid }}" --version "$ver"

      - name: smoke
        shell: bash
        run: |
          ./tool-test/ezgdal --version
          ./tool-test/ezgdal raster --formats | head -10

      - name: DriverProbe
        run: dotnet run --project verify/DriverProbe/DriverProbe.csproj -c Release

      - uses: ./.github/actions/setup-msvc
        if: matrix.rid == 'win-x64'

      # Windows プラグイン SDK の end-to-end 検証。win-x64 nupkg のみ実行:
      # 1) sdk/lib/gdal.lib + sdk/include/gdal/*.h + sdk/cmake/EzGdalSdkConfig.cmake が
      #    install 後の tool ディレクトリに存在すること
      # 2) verify/DummyPlugin を SDK ベースで cmake build して ogr_Dummy.dll が生成されること
      # 3) ezgdal install-plugin → ezgdal ogrinfo --formats で Dummy が見えること
      - name: Windows SDK end-to-end (sdk/ 同梱 + plugin build + autoload)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # tool-test 配下に同梱された sdk/ を探索 (.store/.../tools/net10.0/any/sdk)
          $sdkLib = Get-ChildItem -Recurse -Filter gdal.lib -Path tool-test -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sdkLib) { throw "sdk/lib/gdal.lib not packed into Jumboly.EzGdal.win-x64 nupkg" }
          $sdkRoot = $sdkLib.Directory.Parent.FullName
          Write-Host "sdk root: $sdkRoot"

          # Dummy plugin を SDK ベースで build
          $env:EZGDAL_SDK_DIR = $sdkRoot
          cmake -S verify/DummyPlugin -B verify/DummyPlugin/build -A x64
          cmake --build verify/DummyPlugin/build --config Release

          $dummyDll = "verify\DummyPlugin\build\Release\ogr_Dummy.dll"
          if (-not (Test-Path $dummyDll)) { throw "ogr_Dummy.dll not built at $dummyDll" }

          # 診断 1: ビルドされた DLL が RegisterOGRDummy を実際に export しているか確認
          Write-Host "--- dumpbin /exports ogr_Dummy.dll ---"
          dumpbin /exports $dummyDll
          Write-Host "---------------------------------------"

          # autoload smoke。CPL_DEBUG=ON で plugin loader の "Auto register" /
          # "Can't find requested entry point" 等の診断 log を表示。配列のまま
          # `-match` を適用すると element-wise filter になり、null/空でも安全。
          .\tool-test\ezgdal install-plugin $dummyDll
          $env:CPL_DEBUG = "ON"
          $output = .\tool-test\ezgdal ogrinfo --formats 2>&1
          Remove-Item Env:CPL_DEBUG
          Write-Host "--- ogrinfo --formats (CPL_DEBUG=ON, stdout+stderr) ---"
          $output | ForEach-Object { Write-Host $_ }
          Write-Host "--------------------------------------------------------"
          if (-not ($output -match '^\s*Dummy\s+-')) {
              throw "Dummy driver not visible after install-plugin"
          }
          Write-Host "=== Windows SDK end-to-end OK ==="

  publish:
    needs: verify
    runs-on: ubuntu-22.04
    environment: nuget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          path: nupkg
          merge-multiple: true

      - name: NuGet.org push
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for f in nupkg/Jumboly.EzGdal.*.nupkg; do
            echo "=== $f ==="
            dotnet nuget push "$f" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done
