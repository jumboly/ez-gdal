name: win-sdk-poc

# Windows プラグイン正式サポート確立準備フェーズ (Phase 1) の PoC を
# windows-2022 runner で 1 回回す。trigger は workflow_dispatch のみで、
# push / PR ではトリガしない。
#
# 詳細: docs/win-plugin-poc.md / scripts/win-sdk/README.md
on:
  workflow_dispatch:

jobs:
  poc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore MaxRev WindowsRuntime
        shell: pwsh
        run: dotnet restore src/EzGdal/EzGdal.csproj -p:_NeedWindows=true -p:RuntimeIdentifier=win-x64

      - name: Run PoC (gen-import-lib + fetch-headers + link smoke test)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # MSVC env を立てる。Enter-VsDevShell は呼んだ pwsh プロセス内
          # でしか env が効かないため、PoC 実行も同 step 内に閉じ込める。
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -property installationPath
          if (-not $vsInstall) { throw "Visual Studio not found via vswhere" }
          Import-Module (Join-Path $vsInstall 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsInstall -DevCmdArguments '-arch=x64 -no_logo' -SkipAutomaticLocation

          # MaxRev runtime 内の gdal.dll を特定。csproj が依存する
          # 3.12.3.499 をハードコード (PoC スコープ)。
          $dll = "$env:USERPROFILE\.nuget\packages\maxrev.gdal.windowsruntime.minimal\3.12.3.499\runtimes\win-x64\native\gdal.dll"
          if (-not (Test-Path $dll)) { throw "gdal.dll not found at $dll" }

          .\scripts\win-sdk\gen-import-lib.ps1 -DllPath $dll
          .\scripts\win-sdk\fetch-gdal-headers.ps1 -Version 3.12.3

          # 生成した import library + headers でリンクが通るかの最小確認。
          $build = 'scripts\win-sdk\build'
          @'
          extern "C" void GDALAllRegister();
          int main() { GDALAllRegister(); return 0; }
          '@ | Set-Content -Encoding ASCII probe.cpp

          cl /nologo /EHsc /I "$build\include\gdal" probe.cpp /link "$build\gdal.lib"
          if ($LASTEXITCODE -ne 0) { throw "cl/link failed (exit $LASTEXITCODE)" }

          # gdal.dll が PATH に居ないと probe.exe が起動できないので
          # MaxRev runtime ディレクトリを足す。
          $env:PATH = "$(Split-Path $dll);$env:PATH"
          .\probe.exe
          if ($LASTEXITCODE -ne 0) { throw "probe.exe failed (exit $LASTEXITCODE)" }
          Write-Host '=== PoC OK: gdal.lib links and GDALAllRegister() runs ==='

      - name: Upload PoC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-sdk-poc-build
          path: |
            scripts/win-sdk/build/gdal.lib
            scripts/win-sdk/build/gdal.def
            scripts/win-sdk/build/gdal.exports.txt
            scripts/win-sdk/build/include/gdal/
          if-no-files-found: warn
